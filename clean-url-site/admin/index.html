<!doctype html>
<html>
  <head>
<script id="hide-url-root">
  (function () {
    var canonicalHost = "alaman.in";
    var host = window.location.hostname.toLowerCase();
    var isProdHost = host === canonicalHost || host === ("www." + canonicalHost);

    if (isProdHost && host !== canonicalHost) {
      window.location.replace("https://" + canonicalHost + window.location.pathname + window.location.search + window.location.hash);
      return;
    }

    if (!window.location.pathname.startsWith("/admin") && window.location.pathname !== "/") {
      window.history.replaceState(null, "", "/");
    }
  })();
</script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <base href="/admin/" />
    <title>Content Manager</title>
  </head>
  <body>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      if (window.location.protocol !== "https:") {
        window.location.replace(
          "https://" +
            window.location.host +
            window.location.pathname +
            window.location.search +
            window.location.hash
        );
      }

      // Normalize accidental nested login/admin routes on static hosting.
      if (
        window.location.pathname.indexOf("/index.html/admin") !== -1 ||
        window.location.pathname === "/admin/login"
      ) {
        window.location.replace("/admin/");
      }

      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", function (user) {
          if (!user) {
            window.netlifyIdentity.on("login", function () {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
  </body>
</html>
